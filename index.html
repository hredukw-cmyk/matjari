<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>متجري — سجّل أو ادخل</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #2c1810 0%, #5c2e1a 50%, #8b4513 100%);
    font-family: 'Noto Kufi Arabic', sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: white; border-radius: 24px;
    padding: 32px 28px; width: 100%; max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.3);
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo h1 { font-size: 28px; font-weight: 900; color: #2c1810; }
  .logo p { color: #9a7a65; font-size: 13px; margin-top: 6px; }
  .tabs { display: flex; background: #f5ede6; border-radius: 12px; padding: 4px; margin-bottom: 24px; }
  .tab {
    flex: 1; padding: 10px; border: none; border-radius: 10px;
    font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer;
    background: transparent; color: #9a7a65; transition: all 0.2s;
  }
  .tab.active { background: white; color: #c0622a; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 700; color: #5c3a28; margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1.5px solid #e8d5c4; font-size: 14px;
    font-family: inherit; color: #2c1810; background: #fdf8f3;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: #c0622a; }
  .btn {
    width: 100%; padding: 15px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, #c0622a, #8b4513);
    color: white; font-family: inherit; font-weight: 800;
    font-size: 16px; cursor: pointer; margin-top: 4px;
    transition: all 0.2s;
  }
  .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .btn:disabled { background: #d4b8a8; cursor: not-allowed; transform: none; }
  .error {
    background: #fff0f0; border: 1px solid #fcc; border-radius: 10px;
    padding: 10px 14px; color: #c0392b; font-size: 13px;
    font-weight: 600; margin-bottom: 16px; display: none;
  }
  .success {
    background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px;
    padding: 10px 14px; color: #166534; font-size: 13px;
    font-weight: 600; margin-bottom: 16px; display: none;
  }
  .hint { text-align: center; color: #9a7a65; font-size: 13px; margin-top: 16px; }
  .hint span { color: #c0622a; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div style="font-size:48px;margin-bottom:8px">🛍️</div>
    <h1>متجري</h1>
    <p>ابدأ بيعك في دقائق</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
    <button class="tab" onclick="switchTab('register')">متجر جديد</button>
  </div>

  <div id="error" class="error"></div>
  <div id="success" class="success"></div>

  <!-- Register fields -->
  <div id="register-fields" style="display:none">
    <div class="field">
      <label>🏪 اسم المتجر</label>
      <input type="text" id="storeName" placeholder="مثال: مطبخ أم نورة" />
    </div>
    <div class="field">
      <label>📱 رقم الواتساب</label>
      <input type="tel" id="whatsapp" placeholder="965XXXXXXXX" />
    </div>
  </div>

  <div class="field">
    <label>📧 البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@email.com" dir="ltr" />
  </div>

  <div class="field">
    <label>🔒 كلمة المرور</label>
    <input type="password" id="password" placeholder="••••••••" dir="ltr" />
  </div>

  <button class="btn" id="submitBtn" onclick="handleSubmit()">دخول إلى داشبورد ←</button>

  <p class="hint" id="hint">
    ما عندك حساب؟ <span onclick="switchTab('register')">أنشئ متجرك مجاناً</span>
  </p>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA9aysxwa-S7GmRbBxjOTrjgOG4_c3fT4k",
    authDomain: "matgary-2f25f.firebaseapp.com",
    projectId: "matgary-2f25f",
    storageBucket: "matgary-2f25f.firebasestorage.app",
    messagingSenderId: "360734383265",
    appId: "1:360734383265:web:e9dbf5f3048fecb76ea4e0",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentTab = "login";

  window.switchTab = (tab) => {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach((t, i) => {
      t.classList.toggle("active", (tab === "login" && i === 0) || (tab === "register" && i === 1));
    });
    document.getElementById("register-fields").style.display = tab === "register" ? "block" : "none";
    document.getElementById("submitBtn").textContent = tab === "login" ? "دخول إلى داشبورد ←" : "إنشاء متجري الآن ←";
    document.getElementById("hint").innerHTML = tab === "login"
      ? `ما عندك حساب؟ <span onclick="switchTab('register')">أنشئ متجرك مجاناً</span>`
      : `عندك حساب؟ <span onclick="switchTab('login')">سجّل دخول</span>`;
    showError(""); showSuccess("");
  };

  window.handleSubmit = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("submitBtn");

    if (!email || !password) return showError("الرجاء تعبئة جميع الحقول");

    btn.disabled = true;
    btn.textContent = "⏳ جاري التحميل...";
    showError(""); showSuccess("");

    try {
      if (currentTab === "login") {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
      } else {
        const storeName = document.getElementById("storeName").value.trim();
        const whatsapp = document.getElementById("whatsapp").value.trim();
        if (!storeName) return showError("الرجاء إدخال اسم المتجر");

        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const slug = storeName.replace(/\s+/g, "-").replace(/[^\w\u0600-\u06FF-]/g, "").toLowerCase() + "-" + Date.now();

        await setDoc(doc(db, "stores", cred.user.uid), {
          storeName, whatsapp, email, slug,
          plan: "trial",
          trialStart: serverTimestamp(),
          status: "active",
          createdAt: serverTimestamp(),
        });

        showSuccess(`🎉 تم إنشاء متجرك! جاري الدخول...`);
        setTimeout(() => window.location.href = "dashboard.html", 1500);
      }
    } catch (e) {
      const msgs = {
        "auth/email-already-in-use": "البريد مسجّل مسبقاً",
        "auth/wrong-password": "كلمة المرور غير صحيحة",
        "auth/user-not-found": "البريد غير مسجّل",
        "auth/weak-password": "كلمة المرور ضعيفة — 6 أحرف على الأقل",
        "auth/invalid-email": "البريد الإلكتروني غير صحيح",
      };
      showError(msgs[e.code] || "حدث خطأ، حاول مرة أخرى");
    } finally {
      btn.disabled = false;
      btn.textContent = currentTab === "login" ? "دخول إلى داشبورد ←" : "إنشاء متجري الآن ←";
    }
  };

  function showError(msg) {
    const el = document.getElementById("error");
    el.textContent = msg ? "⚠️ " + msg : "";
    el.style.display = msg ? "block" : "none";
  }

  function showSuccess(msg) {
    const el = document.getElementById("success");
    el.textContent = msg;
    el.style.display = msg ? "block" : "none";
  }

  // Enter key
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") window.handleSubmit();
  });
</script>
</body>
</html>
