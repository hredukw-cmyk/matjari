<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>متجري</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;900&display=swap');

:root {
  --gold: #c9a84c;
  --gold-light: #f0d98a;
  --gold-dark: #7a5a0a;
  --black: #050505;
  --black-2: #0d0d0d;
  --black-3: #161616;
  --black-4: #1f1f1f;
  --white: #f5f0e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--black);
  font-family: 'Noto Kufi Arabic', sans-serif;
  color: var(--white); min-height: 100vh; overflow-x: hidden;
}

/* ─── Particles canvas ─── */
#canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0.6;
}

/* ─── Splash screen ─── */
#splash {
  position: fixed; inset: 0; z-index: 500;
  background: var(--black);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#splash.hidden { opacity: 0; visibility: hidden; }

.splash-ring {
  width: 120px; height: 120px; border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.15);
  display: flex; align-items: center; justify-content: center;
  position: relative; margin-bottom: 28px;
  animation: ringPulse 2s ease infinite;
}
.splash-ring::before {
  content: ''; position: absolute; inset: -8px; border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.08);
  animation: ringPulse 2s 0.3s ease infinite;
}
.splash-ring::after {
  content: ''; position: absolute; inset: -16px; border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.04);
  animation: ringPulse 2s 0.6s ease infinite;
}
.splash-emoji { font-size: 52px; z-index: 1; }
.splash-name {
  font-size: 24px; font-weight: 900; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: fadeUp 1s 0.3s ease both;
}
.splash-line {
  width: 0; height: 1px; margin: 14px auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: lineGrow 1s 0.8s ease forwards;
}
.splash-sub { color: rgba(245,240,232,0.35); font-size: 12px; font-weight: 300; animation: fadeUp 1s 0.6s ease both; }
.splash-loader {
  margin-top: 40px; width: 40px; height: 2px;
  background: rgba(201,168,76,0.1); border-radius: 2px; overflow: hidden;
}
.splash-loader-bar {
  height: 100%; width: 0%; background: var(--gold);
  border-radius: 2px; animation: loadBar 2s ease forwards;
}

@keyframes ringPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.05);opacity:0.7} }
@keyframes lineGrow { to{width:60px} }
@keyframes loadBar { to{width:100%} }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes scaleIn { from{opacity:0;transform:scale(0.9) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes goldPulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0)} 50%{box-shadow:0 0 30px 6px rgba(201,168,76,0.2)} }

/* ─── Main content ─── */
#mainContent { position: relative; z-index: 1; opacity: 0; transition: opacity 1s ease; }
#mainContent.visible { opacity: 1; }

/* ─── Header ─── */
.store-header {
  min-height: 320px; position: relative;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 60px 24px 40px; overflow: hidden;
}
.header-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 100% 80% at 50% -10%, rgba(201,168,76,0.2) 0%, transparent 65%);
}
.header-bg-2 {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%);
  animation: float 4s ease infinite;
}
.header-ring-1 { position: absolute; top: -250px; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.06); }
.header-ring-2 { position: absolute; top: -180px; left: 50%; transform: translateX(-50%); width: 400px; height: 400px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.08); }

.store-logo {
  position: relative; z-index: 1; width: 88px; height: 88px; border-radius: 24px;
  background: linear-gradient(135deg, var(--black-3), var(--black-4));
  border: 1px solid rgba(201,168,76,0.2);
  display: flex; align-items: center; justify-content: center; font-size: 40px;
  margin-bottom: 20px;
  box-shadow: 0 0 40px rgba(201,168,76,0.12), 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.15);
  animation: fadeUp 0.8s 0.1s ease both, float 5s 1s ease infinite;
}
.gold-line {
  width: 60px; height: 1px; margin: 14px auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  position: relative; z-index: 1;
  animation: fadeIn 1s 0.3s ease both;
}
.store-name {
  position: relative; z-index: 1; font-size: 28px; font-weight: 900;
  background: linear-gradient(135deg, var(--gold-light), var(--gold) 50%, var(--gold-dark));
  background-size: 200% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: fadeUp 0.8s 0.2s ease both, shimmer 4s 2s linear infinite;
  letter-spacing: -0.5px;
}
.store-desc {
  position: relative; z-index: 1;
  font-size: 13px; color: rgba(245,240,232,0.5); font-weight: 300;
  max-width: 260px; line-height: 1.9; margin-top: 6px;
  animation: fadeUp 0.8s 0.3s ease both;
}
.store-tag {
  position: relative; z-index: 1;
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid rgba(201,168,76,0.18); border-radius: 50px;
  padding: 6px 16px; font-size: 11px; font-weight: 600; color: var(--gold);
  margin-top: 12px; background: rgba(201,168,76,0.05);
  animation: fadeUp 0.8s 0.4s ease both;
}

/* Cart float */
.cart-float {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  z-index: 200; opacity: 0;
  background: linear-gradient(135deg, #1a1200, #2c2000);
  border: 1px solid var(--gold); border-radius: 50px;
  padding: 14px 28px; color: var(--gold);
  font-family: inherit; font-weight: 800; font-size: 14px; cursor: pointer;
  white-space: nowrap; animation: goldPulse 2.5s 1s infinite;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.08);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
}
.cart-float.visible {
  transform: translateX(-50%) translateY(0); opacity: 1;
}
.cart-float:hover { transform: translateX(-50%) translateY(-3px) !important; }

/* Main */
.main { max-width: 500px; margin: 0 auto; padding: 8px 16px 140px; position: relative; z-index: 1; }

/* Section header */
.sec-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; animation: fadeUp 0.8s 0.5s ease both; }
.sec-head-lbl { color: var(--gold); font-size: 10px; font-weight: 700; letter-spacing: 3px; white-space: nowrap; }
.sec-head-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent); }

/* Products grid */
.products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }

.product-card {
  background: var(--black-2); border: 1px solid rgba(201,168,76,0.08);
  border-radius: 20px; overflow: hidden; cursor: pointer;
  opacity: 0; transform: scale(0.9) translateY(20px);
  transition: all 0.4s cubic-bezier(0.34,1.2,0.64,1);
  position: relative; display: flex; flex-direction: column;
}
.product-card.loaded { opacity: 1; transform: scale(1) translateY(0); }
.product-card::before {
  content: ''; position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.06), transparent 60%);
  opacity: 0; transition: opacity 0.3s;
}
.product-card:hover {
  border-color: rgba(201,168,76,0.4); transform: translateY(-6px) scale(1.02) !important;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.1);
}
.product-card:hover::before { opacity: 1; }

.product-visual {
  height: 160px; width: 100%; position: relative;
  display: flex; align-items: center; justify-content: center; font-size: 64px;
  background: linear-gradient(135deg, var(--black-3), var(--black-4)); overflow: hidden;
}
.product-visual::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.12), transparent);
}
.product-visual .glow {
  position: absolute; width: 100px; height: 100px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.18), transparent 70%);
  filter: blur(24px); opacity: 0; transition: opacity 0.3s;
}
.product-card:hover .glow { opacity: 1; }

.qty-badge {
  position: absolute; top: 8px; left: 8px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--black); border-radius: 50%; width: 24px; height: 24px;
  display: none; align-items: center; justify-content: center;
  font-weight: 900; font-size: 11px; z-index: 3;
  box-shadow: 0 2px 8px rgba(201,168,76,0.4);
  animation: scaleIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.product-body { padding: 14px 14px 16px; flex: 1; position: relative; z-index: 2; display: flex; flex-direction: column; }
.product-name { font-weight: 800; font-size: 14px; color: var(--white); margin-bottom: 4px; }
.product-desc { font-size: 11px; color: rgba(245,240,232,0.35); margin-bottom: 12px; line-height: 1.6; font-weight: 300; flex: 1; }
.product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
.product-price {
  font-weight: 900; font-size: 14px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.btn-add {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border: none; color: var(--black); font-size: 20px; font-weight: 900;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(201,168,76,0.3);
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.btn-add:hover { transform: scale(1.2) rotate(90deg); box-shadow: 0 6px 24px rgba(201,168,76,0.5); }
.btn-add:active { transform: scale(0.95); }

.qty-controls { display: flex; align-items: center; gap: 8px; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%; border: 1px solid;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-weight: 700; transition: all 0.2s;
}
.qty-btn.minus { border-color: rgba(201,168,76,0.25); background: transparent; color: var(--gold); }
.qty-btn.minus:hover { background: rgba(201,168,76,0.1); }
.qty-btn.plus { border-color: var(--gold); background: var(--gold); color: var(--black); }
.qty-btn.plus:hover { background: var(--gold-light); }
.qty-num { color: var(--white); font-weight: 900; font-size: 14px; min-width: 16px; text-align: center; }

/* Steps */
.step { display: none; }
.step.active { display: block; animation: fadeUp 0.5s ease; }
.back-btn {
  background: none; border: none; color: var(--gold); font-family: inherit;
  font-weight: 700; font-size: 13px; cursor: pointer; margin-bottom: 22px; padding: 0;
  display: inline-flex; align-items: center; gap: 4px; opacity: 0.8; transition: opacity 0.2s;
}
.back-btn:hover { opacity: 1; }

/* Lux card */
.lux-card {
  background: var(--black-2); border: 1px solid rgba(201,168,76,0.1);
  border-radius: 20px; padding: 22px; margin-bottom: 14px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(201,168,76,0.05);
  transition: border-color 0.3s;
}
.lux-card:hover { border-color: rgba(201,168,76,0.18); }
.lux-card-title { font-weight: 800; font-size: 13px; color: var(--gold); margin-bottom: 16px; letter-spacing: 0.5px; }

/* Days */
.days-row { display: flex; gap: 8px; flex-wrap: wrap; }
.day-btn {
  padding: 9px 14px; border-radius: 10px; border: 1px solid rgba(201,168,76,0.12);
  background: transparent; color: rgba(245,240,232,0.45); font-family: inherit;
  font-weight: 700; font-size: 12px; cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34,1.2,0.64,1);
}
.day-btn:hover { border-color: rgba(201,168,76,0.3); color: var(--white); transform: translateY(-2px); }
.day-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold); transform: translateY(-2px); }

/* Slots */
.slots-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.slot-btn {
  padding: 12px 6px; border-radius: 14px; border: 1px solid rgba(201,168,76,0.1);
  background: transparent; cursor: pointer; text-align: center; font-family: inherit;
  transition: all 0.25s cubic-bezier(0.34,1.2,0.64,1);
}
.slot-btn:hover:not(:disabled) { border-color: rgba(201,168,76,0.35); transform: translateY(-2px); }
.slot-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.08); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(201,168,76,0.1); }
.slot-btn:disabled { opacity: 0.2; cursor: not-allowed; }
.slot-time { font-weight: 800; font-size: 14px; color: var(--white); }
.slot-btn.active .slot-time { color: var(--gold); }
.slot-status { font-size: 9px; margin-top: 3px; font-weight: 600; color: rgba(245,240,232,0.3); }

/* Field */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10px; font-weight: 700; color: var(--gold); margin-bottom: 7px; letter-spacing: 1.5px; }
.field input {
  width: 100%; padding: 12px 16px; border-radius: 12px;
  border: 1px solid rgba(201,168,76,0.12); background: rgba(255,255,255,0.02);
  color: var(--white); font-family: inherit; font-size: 13px; outline: none;
  transition: all 0.3s;
}
.field input:focus { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.04); box-shadow: 0 0 0 3px rgba(201,168,76,0.06); }
.field input::placeholder { color: rgba(245,240,232,0.18); }
.field input:disabled { opacity: 0.3; cursor: not-allowed; }

.gps-btn {
  width: 100%; padding: 12px; border-radius: 12px;
  border: 1px solid rgba(34,197,94,0.2); background: rgba(34,197,94,0.04);
  color: #22c55e; font-family: inherit; font-weight: 700; font-size: 12px;
  cursor: pointer; margin-bottom: 8px; transition: all 0.25s;
}
.gps-btn:hover { background: rgba(34,197,94,0.08); transform: translateY(-1px); }

.loc-badge {
  background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.15);
  border-radius: 12px; padding: 10px 12px; display: none;
  align-items: center; gap: 10px; margin-bottom: 8px;
  animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

/* Payment */
.pay-row { display: flex; gap: 10px; }
.pay-btn {
  flex: 1; padding: 16px 8px; border-radius: 16px; border: 1px solid rgba(201,168,76,0.1);
  background: transparent; cursor: pointer; text-align: center; font-family: inherit;
  transition: all 0.3s cubic-bezier(0.34,1.2,0.64,1);
}
.pay-btn:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-2px); }
.pay-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.07); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.1); }
.pay-icon { font-size: 26px; margin-bottom: 6px; }
.pay-label { font-size: 11px; font-weight: 700; color: rgba(245,240,232,0.4); }
.pay-btn.active .pay-label { color: var(--gold); }
.transfer-box {
  margin-top: 14px; background: rgba(34,197,94,0.04); border: 1px solid rgba(34,197,94,0.12);
  border-radius: 14px; padding: 16px; display: none;
  animation: fadeUp 0.4s ease;
}

/* Summary */
.sum-item {
  display: flex; justify-content: space-between; padding: 10px 0;
  border-bottom: 1px solid rgba(201,168,76,0.06); font-size: 13px;
}
.sum-total { display: flex; justify-content: space-between; padding-top: 14px; margin-top: 4px; border-top: 1px solid rgba(201,168,76,0.15); }
.sum-total-l { color: var(--white); font-weight: 900; font-size: 15px; }
.sum-total-v {
  font-weight: 900; font-size: 18px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* Delivery badge */
.del-badge {
  display: flex; align-items: center; gap: 12px;
  background: rgba(201,168,76,0.04); border: 1px solid rgba(201,168,76,0.15);
  border-radius: 14px; padding: 13px 15px; margin-bottom: 14px;
  animation: scaleIn 0.4s ease;
}

/* CTA */
.cta-btn {
  width: 100%; padding: 17px; border: none; border-radius: 16px;
  background: linear-gradient(135deg, #120d00 0%, var(--gold-dark) 40%, var(--gold) 100%);
  color: var(--black); font-family: inherit; font-weight: 900;
  font-size: 16px; cursor: pointer; letter-spacing: 0.5px;
  box-shadow: 0 8px 30px rgba(201,168,76,0.25);
  transition: all 0.3s cubic-bezier(0.34,1.2,0.64,1);
  position: relative; overflow: hidden;
}
.cta-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.cta-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(201,168,76,0.4); }
.cta-btn:hover:not(:disabled)::before { opacity: 1; }
.cta-btn:active:not(:disabled) { transform: translateY(-1px); }
.cta-btn:disabled { background: var(--black-3); color: rgba(245,240,232,0.12); cursor: not-allowed; box-shadow: none; }

/* Success */
.success-sc { text-align: center; padding: 60px 20px; animation: fadeUp 0.8s ease; }
.success-ring {
  width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 24px;
  background: linear-gradient(135deg, var(--black-3), var(--black-4));
  border: 1px solid rgba(201,168,76,0.2);
  display: flex; align-items: center; justify-content: center; font-size: 50px;
  box-shadow: 0 0 60px rgba(201,168,76,0.15), 0 0 120px rgba(201,168,76,0.05);
  animation: float 4s ease infinite;
}
.success-title {
  font-size: 26px; font-weight: 900;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 8px;
}
.success-sub { color: rgba(245,240,232,0.45); font-size: 13px; line-height: 1.9; margin-bottom: 32px; }
.wa-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(37,211,102,0.07); border: 1px solid rgba(37,211,102,0.2);
  color: #25D366; text-decoration: none; border-radius: 50px;
  padding: 14px 28px; font-weight: 700; font-size: 14px; font-family: inherit;
  transition: all 0.3s; box-shadow: 0 4px 20px rgba(37,211,102,0.1);
}
.wa-btn:hover { background: rgba(37,211,102,0.14); transform: translateY(-2px); }

/* Loading / not found */
.loading-sc { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.spinner { width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(201,168,76,0.08); border-top-color: var(--gold); animation: spin 1s linear infinite; }
</style>
</head>
<body>

<!-- Particles -->
<canvas id="canvas"></canvas>

<!-- Splash -->
<div id="splash">
  <div class="splash-ring">
    <div class="splash-emoji" id="splashEmoji">🍽️</div>
  </div>
  <div class="splash-name" id="splashName">متجري</div>
  <div class="splash-line"></div>
  <div class="splash-sub" id="splashSub">جاري التحميل...</div>
  <div class="splash-loader"><div class="splash-loader-bar"></div></div>
</div>

<!-- Not found -->
<div id="notFound" style="display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:rgba(245,240,232,0.25);font-size:14px">
  <div style="font-size:48px">😕</div><div>المتجر غير موجود</div>
</div>

<!-- Main -->
<div id="mainContent">
  <div class="store-header">
    <div class="header-bg"></div>
    <div class="header-bg-2"></div>
    <div class="header-ring-1"></div>
    <div class="header-ring-2"></div>
    <div class="store-logo" id="storeEmoji">🍽️</div>
    <div class="gold-line"></div>
    <div class="store-name" id="storeName">...</div>
    <div class="store-desc" id="storeDesc"></div>
    <div class="store-tag" id="storeTag">✨ متجر فاخر</div>
  </div>

      <div class="lux-card">
        <div class="lux-card-title">🧾 ملخص الطلب</div>

      <div class="lux-card">
        <div class="lux-card-title">📍 بيانات التوصيل</div>
        <div class="field"><label>الاسم</label><input type="text" id="custName" placeholder="اسمك الكريم"/></div>
        <div class="field"><label>رقم الهاتف</label><input type="tel" id="custPhone" placeholder="05XXXXXXXX" dir="ltr"/></div>
        <div class="field">
          <label>الموقع</label>
          <button class="gps-btn" id="gpsBtn" onclick="getLocation()">📡 تحديد موقعي تلقائياً</button>
          <div id="locBadge" class="loc-badge">
            <span>📍</span>
            <div style="flex:1"><div style="font-weight:800;font-size:13px;color:var(--white)" id="locArea"></div><div style="color:rgba(245,240,232,0.3);font-size:10px" id="locCoords" dir="ltr"></div></div>
            <button onclick="clearLoc()" style="background:none;border:none;color:rgba(245,240,232,0.3);cursor:pointer;font-size:15px">✕</button>
          </div>
          <input type="text" id="custAddress" placeholder="أو اكتب العنوان يدوياً..."/>

        <div class="field"><label>ملاحظات</label><input type="text" id="custNotes" placeholder="أي تعليمات خاصة..."/></div>
      </div>
      <div class="lux-card">

      </div>
    </div>

  </div>

<script>
// ─── Particles ───────────────────────────────────────────────
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function createParticle() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 1.5 + 0.3,
    speedX: (Math.random() - 0.5) * 0.3,
    speedY: -(Math.random() * 0.4 + 0.1),
    opacity: Math.random() * 0.5 + 0.1,
    life: 1,
    decay: Math.random() * 0.003 + 0.001,
  };
}

for (let i = 0; i < 80; i++) particles.push(createParticle());

function animParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach((p, i) => {
    p.x += p.speedX; p.y += p.speedY; p.life -= p.decay;
    if (p.life <= 0) particles[i] = createParticle();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,168,76,${p.opacity * p.life})`;
    ctx.fill();
  });
  requestAnimationFrame(animParticles);
}
animParticles();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyA9aysxwa-S7GmRbBxjOTrjgOG4_c3fT4k",
  authDomain: "matgary-2f25f.firebaseapp.com",
  projectId: "matgary-2f25f",
  storageBucket: "matgary-2f25f.firebasestorage.app",
  messagingSenderId: "360734383265",
  appId: "1:360734383265:web:e9dbf5f3048fecb76ea4e0",
});
const db = getFirestore(app);

let storeData=null, products=[], cart={};
let selDate="", selSlot="", payment="";
let lat=null, lng=null, area="";

const slug = new URLSearchParams(window.location.search).get("store");
const total = () => Object.entries(cart).reduce((s,[id,q])=>{const p=products.find(p=>p.id===id);return s+(p?p.price*q:0);},0);

const THEMES = {
  restaurant:{emoji:"🍽️",tag:"✨ أشهى الأكلات"},
  fashion:{emoji:"👗",tag:"✨ كولكشن جديد"},
  sweets:{emoji:"🧁",tag:"✨ محضّر بالحب"},
  beauty:{emoji:"💄",tag:"✨ فاخر وأصيل"},
  organic:{emoji:"🌿",tag:"✨ طبيعي 100%"},
  general:{emoji:"📦",tag:"✨ توصيل سريع"},
};

async function init() {
  if (!slug) { showNF(); return; }
  try {
    const snap = await getDocs(query(collection(db,"stores"),where("slug","==",slug)));
    if (snap.empty) { showNF(); return; }
    storeData = {id:snap.docs[0].id,...snap.docs[0].data()};
    await render();
  } catch(e) { showNF(); }
}

function showNF() {
  document.getElementById("splash").classList.add("hidden");
  document.getElementById("notFound").style.display="flex";
}

async function render() {
  const cat = storeData.category||"restaurant";
  const t = THEMES[cat]||THEMES.restaurant;

  // Update splash
  document.getElementById("splashEmoji").textContent = t.emoji;
  document.getElementById("splashName").textContent = storeData.storeName;
  document.getElementById("splashSub").textContent = storeData.description||"";

  // Update main
  document.getElementById("storeEmoji").textContent = t.emoji;
  document.getElementById("storeName").textContent = storeData.storeName;
  document.getElementById("storeDesc").textContent = storeData.description||"";
  document.getElementById("storeTag").textContent = t.tag;
  document.title = storeData.storeName+" — متجري";
  if(storeData.bankName) document.getElementById("bankName").textContent=storeData.bankName;
  if(storeData.bankAccount) document.getElementById("bankAccount").textContent=storeData.bankAccount;
  if(storeData.bankIban) document.getElementById("bankIban").textContent=storeData.bankIban;

  const ps = await getDocs(collection(db,"stores",storeData.id,"products"));
  products = ps.docs.map(d=>({id:d.id,...d.data()}));

  renderProds();
  renderDays();

  // Hide splash, show content
  setTimeout(() => {
    document.getElementById("splash").classList.add("hidden");
    document.getElementById("mainContent").classList.add("visible");
    // Animate cards in
    setTimeout(() => {
      document.querySelectorAll(".product-card").forEach((c,i) => {
        setTimeout(() => c.classList.add("loaded"), i * 100);
      });
    }, 300);
  }, 2200);
}

function renderProds() {
  document.getElementById("productsGrid").innerHTML = products.map(p=>{
    const discount = p.hasOffer && p.originalPrice
      ? Math.round(((p.originalPrice - p.price) / p.originalPrice) * 100) : 0;
    return `
    <div class="product-card" id="pc-${p.id}">
      <div class="product-visual">
        <div class="glow"></div>
        <span style="position:relative;z-index:1">${p.emoji||"🍽️"}</span>
        <div class="qty-badge" id="b-${p.id}"></div>
        ${p.hasOffer ? `<div style="position:absolute;top:8px;right:8px;background:rgba(239,68,68,0.9);color:white;font-size:9px;font-weight:900;padding:2px 7px;border-radius:50px;z-index:3">🔥 عرض</div>` : ""}
      </div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc||""}</div>
        ${p.hasOffer && p.offerLabel ? `<div style="color:#ef4444;font-size:10px;font-weight:700;margin-bottom:6px">${p.offerLabel}</div>` : ""}
        <div class="product-footer">
          <div>
            <div class="product-price">${parseFloat(p.price).toFixed(3)} KWD</div>
            ${p.hasOffer && p.originalPrice ? `<div style="font-size:10px;color:rgba(245,240,232,0.3);text-decoration:line-through;margin-top:1px">${parseFloat(p.originalPrice).toFixed(3)} KWD</div>` : ""}
          </div>
          <div id="c-${p.id}"><button class="btn-add" onclick="addItem('${p.id}')">+</button></div>
        </div>
      </div>
    </div>`}).join("");
}

function renderDays() {
  const days=[];
  for(let i=0;i<5;i++){
    const d=new Date(); d.setDate(d.getDate()+i);
    const v=d.toISOString().split("T")[0];
    const l=i===0?"اليوم":i===1?"غداً":d.toLocaleDateString("ar-KW",{weekday:"short",day:"numeric",month:"short"});
    days.push({v,l});
  }
  document.getElementById("daysGrid").innerHTML=days.map(d=>
    `<button class="day-btn" onclick="selDay('${d.v}')">${d.l}</button>`
  ).join("");
}

window.selDay=v=>{
  selDate=v; selSlot="";
  document.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("slotsCard").style.display="block";
  const slots=storeData.slots||["07:00","08:00","09:00","12:00","13:00"];
  const max=storeData.maxPerSlot||5;
  document.getElementById("slotsGrid").innerHTML=slots.map(s=>{
    const b=storeData.booked?.[`${v}_${s}`]||0;
    const av=b<max; const rem=max-b;
    return `<button class="slot-btn" ${!av?"disabled":""} onclick="selSlot('${s}')">
      <div class="slot-time">${s}</div>
      <div class="slot-status" style="${rem<=2&&av?"color:#f87171":""}">${!av?"ممتلئ":rem<=2?`${rem} متبقي`:"متاح"}</div>
    </button>`;
  }).join("");
  chk2();
};

window.selSlot=s=>{
  selSlot=s;
  document.querySelectorAll(".slot-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  chk2();
};
function chk2(){document.getElementById("nextBtn").disabled=!(selDate&&selSlot);}

window.addItem=id=>{cart[id]=(cart[id]||0)+1;updCart(id);};
window.removeItem=id=>{if(cart[id]>1)cart[id]--;else delete cart[id];updCart(id);};

function updCart(id){
  const q=cart[id]||0;
  const b=document.getElementById(`b-${id}`);
  const c=document.getElementById(`c-${id}`);
  if(!q){b.style.display="none";c.innerHTML=`<button class="btn-add" onclick="addItem('${id}')">+</button>`;}
  else{b.textContent=q;b.style.display="flex";
    c.innerHTML=`<div class="qty-controls"><button class="qty-btn minus" onclick="removeItem('${id}')">−</button><span class="qty-num">${q}</span><button class="qty-btn plus" onclick="addItem('${id}')">+</button></div>`;}
  const items=Object.values(cart).reduce((a,b)=>a+b,0);
  const f=document.getElementById("cartFloat");
  if(items>0){f.classList.add("visible");document.getElementById("cartSummary").textContent=`${items} منتج — ${total().toFixed(3)} KWD`;}
  else f.classList.remove("visible");
}

window.goTo=step=>{
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById(`step${step}`).classList.add("active");
  if(step===3)renderCO();
  window.scrollTo({top:0,behavior:"smooth"});
};

function renderCO(){
  document.getElementById("selectedDT").textContent=`${selDate} — الساعة ${selSlot}`;
  const items=Object.entries(cart).map(([id,q])=>{
    const p=products.find(p=>p.id===id);
    return p?`<div class="sum-item"><span style="color:rgba(245,240,232,0.6)">${p.name} × ${q}</span><span style="color:var(--gold);font-weight:700">${(p.price*q).toFixed(3)} KWD</span></div>`:"";
  }).join("");
  document.getElementById("orderSummary").innerHTML=items+`
    <div class="sum-total"><span class="sum-total-l">الإجمالي</span><span class="sum-total-v">${total().toFixed(3)} KWD</span></div>`;
  ["custName","custPhone","custAddress"].forEach(id=>document.getElementById(id).addEventListener("input",chk3));
}

window.getLocation=async()=>{
  const btn=document.getElementById("gpsBtn");
  btn.textContent="⏳ جاري التحديد..."; btn.disabled=true;
  try{
    const pos=await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j,{timeout:10000}));
    lat=pos.coords.latitude; lng=pos.coords.longitude;
    const res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ar`);
    const data=await res.json();
    area=data.address?.suburb||data.address?.city_district||data.address?.city||"موقعك الحالي";
    document.getElementById("locArea").textContent=area;
    document.getElementById("locCoords").textContent=`${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    document.getElementById("locBadge").style.display="flex";
    document.getElementById("custAddress").disabled=true;
    btn.style.display="none"; chk3();
  }catch(e){alert("تعذّر تحديد الموقع");btn.textContent="📡 تحديد موقعي تلقائياً";btn.disabled=false;}
};

window.clearLoc=()=>{
  lat=null;lng=null;area="";
  document.getElementById("locBadge").style.display="none";
  document.getElementById("custAddress").disabled=false;
  document.getElementById("gpsBtn").style.display="block";
  chk3();
};

window.selPay=m=>{
  payment=m;
  document.getElementById("payCash").classList.toggle("active",m==="cash");
  document.getElementById("payTrans").classList.toggle("active",m==="transfer");
  document.getElementById("transferBox").style.display=m==="transfer"?"block":"none";
  chk3();
};

function chk3(){
  const n=document.getElementById("custName").value.trim();
  const p=document.getElementById("custPhone").value.trim();
  const a=area||document.getElementById("custAddress").value.trim();
  document.getElementById("submitBtn").disabled=!(n&&p&&a&&payment&&Object.keys(cart).length>0);
}

window.placeOrder=async()=>{
  const btn=document.getElementById("submitBtn");
  btn.disabled=true; btn.textContent="⏳ جاري الإرسال...";
  try{
    const items=Object.entries(cart).map(([id,q])=>{const p=products.find(p=>p.id===id);return{name:p.name,qty:q,price:p.price};});
    await addDoc(collection(db,"orders"),{
      storeId:storeData.id,
      customerName:document.getElementById("custName").value.trim(),
      customerPhone:document.getElementById("custPhone").value.trim(),
      address:area||document.getElementById("custAddress").value.trim(),
      area:area||document.getElementById("custAddress").value.trim().split("،")[0]||"غير محدد",
      lat,lng,notes:document.getElementById("custNotes").value.trim(),
      items,total:total(),payment,
      deliveryDate:selDate,deliveryTime:selSlot,
      status:"new",createdAt:serverTimestamp(),
    });
    document.getElementById("successMsg").innerHTML=`شكراً ${document.getElementById("custName").value}!<br/>طلبك سيصل الساعة <strong style="color:var(--gold)">${selSlot}</strong><br/>بتاريخ <strong style="color:var(--gold)">${selDate}</strong>`;
    document.getElementById("waLink").href=`https://wa.me/965${storeData.whatsapp}?text=مرحبا، أرسلت طلباً من متجرك`;
    goTo(4);
  }catch(e){alert("حدث خطأ");btn.disabled=false;btn.textContent="✨ تأكيد الطلب";}
};

window.resetOrder=()=>{
  cart={};selDate="";selSlot="";payment="";lat=null;lng=null;area="";
  document.getElementById("cartFloat").classList.remove("visible");
  goTo(1); renderProds();
  setTimeout(()=>{document.querySelectorAll(".product-card").forEach((c,i)=>{c.classList.remove("loaded");setTimeout(()=>c.classList.add("loaded"),i*100);});},100);
};

init();
</script>
